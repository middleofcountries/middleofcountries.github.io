<title>All Countries — Middle of Countries | Geographic Centers</title>

<style>
*, *::before, *::after { box-sizing: border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow-x:hidden; }

/* PAGE HERO */
.countries-hero {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
  padding: 40px 20px 32px;
  text-align: center;
}
.countries-hero h1 { font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 800; margin: 0 0 8px; }
.countries-hero p { font-size: clamp(0.85rem, 2.5vw, 1rem); opacity: 0.85; margin: 0; }

/* SEARCH BAR */
.search-section {
  background: var(--background-color, #fff);
  padding: 20px;
  border-bottom: 1px solid var(--border-color, #ddd);
  position: sticky;
  top: 60px;
  z-index: 100;
}
.search-wrap {
  max-width: 700px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
  align-items: center;
}
.search-wrap input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 10px;
  border: 1px solid var(--border-color, #ddd);
  background: transparent;
  color: var(--text-color, #333);
  font-size: 0.95rem;
  outline: none;
}
.search-wrap input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
.sort-select {
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--border-color, #ddd);
  background: transparent;
  color: var(--text-color, #333);
  font-size: 0.85rem;
  cursor: pointer;
}
.result-count {
  text-align: center;
  font-size: 0.8rem;
  color: #888;
  margin-top: 8px;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
}

/* COUNTRIES GRID */
.countries-section { max-width: 1300px; margin: 0 auto; padding: 24px 16px; }
.countries-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.country-card {
  background: var(--background-color, #fff);
  border: 1px solid var(--border-color, #eee);
  border-radius: 12px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: var(--text-color, #333);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  cursor: pointer;
}
.country-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102,126,234,0.15);
  border-color: #667eea;
}
.country-flag-img {
  width: 44px;
  height: 30px;
  border-radius: 4px;
  object-fit: cover;
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
.country-info { min-width: 0; }
.country-name { font-weight: 700; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.country-sub { font-size: 0.72rem; color: #888; margin-top: 2px; }

/* NO RESULTS */
#no-results {
  text-align: center;
  padding: 40px;
  color: #888;
  font-size: 1rem;
  display: none;
  grid-column: 1 / -1;
}

/* MOBILE */
@media(max-width:480px) {
  .countries-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .country-card { padding: 10px; gap: 8px; }
  .country-flag-img { width: 36px; height: 24px; }
  .country-name { font-size: 0.82rem; }
}

/* DARK MODE */
[data-theme="dark"] .country-card { background: #1e1e2e; border-color: #2d2d44; }
[data-theme="dark"] .country-card:hover { border-color: #667eea; }
[data-theme="dark"] .search-wrap input { background: #1e1e2e; color: #e2e8f0; border-color: #2d2d44; }
[data-theme="dark"] .sort-select { background: #1e1e2e; color: #e2e8f0; border-color: #2d2d44; }
[data-theme="dark"] .search-section { background: #121212; border-color: #2d2d44; }

    <div>

<!-- HERO -->
<div class="countries-hero">
  <h1 data-lang="countries.title">All Countries</h1>
  <p data-lang="hero.subtitle">Explore countries from their geographical centers</p>
</div>

<!-- SEARCH -->
<div class="search-section">
  <div class="search-wrap">
    <input type="search" id="country-search" placeholder="Search countries..." data-lang="countries.search.placeholder" autocomplete="off">
    <select id="sort-select" class="sort-select">
      <option value="az" data-lang="countries.sort.az">A → Z</option>

  "Cyprus","Czechia","Democratic Republic of the Congo","Denmark","Djibouti","Dominica",

  "Pakistan","Palau","Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal",
  "Qatar","Romania","Russia","Rwanda","Saint Kitts and Nevis","Saint Lucia",
  "Saint Vincent and the Grenadines","Samoa","San Marino","Sao Tome and Principe","Saudi Arabia",
  "Senegal","Serbia","Seychelles","Sierra Leone","Singapore","Slovakia","Slovenia","Solomon Islands",
  "Somalia","South Africa","South Korea","South Sudan","Spain","Sri Lanka","Sudan","Suriname",
  "Sweden","Switzerland","Syria","Taiwan","Tajikistan","Tanzania","Thailand","Timor-Leste","Togo",

  "United Arab Emirates","United Kingdom","United States","Uruguay","Uzbekistan","Vanuatu",

];

function toSlug(name) {
  return name.normalize('NFKD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^0-9a-zA-Z\s\-]/g,'').trim().toLowerCase().replace(/\s+/g,'-');
}

/* ── Render cards ── */
function renderCards(list) {
  const grid = document.getElementById('countries-grid');
  const noRes = document.getElementById('no-results');
  // Remove existing cards (keep no-results div)
  Array.from(grid.children).forEach(c => { if (c.id !== 'no-results') grid.removeChild(c); });

  list.forEach(name => {
    const slug = toSlug(name);
    const iso = ISO[name] || '';
    const flagSrc = iso ? '../assets/flags/' + iso + '.svg' : '';
    const flagFallback = iso ? '../assets/flags/' + iso + '.png' : '';

    const a = document.createElement('a');
    a.href = 'right-in-the-middle-of-' + slug + '.html';
    a.className = 'country-card';
    a.setAttribute('data-name', name.toLowerCase());

    const flagHTML = flagSrc
      ? '<img class="country-flag-img" src="' + flagSrc + '" onerror="this.src=\'' + flagFallback + '\'" alt="' + name + ' flag" loading="lazy">'
      : '<div class="country-flag-img" style="background:#ddd;"></div>';

    a.innerHTML = flagHTML +
      '<div class="country-info">' +
        '<div class="country-name">' + name + '</div>' +
        '<div class="country-sub" data-lang="countries.open">See the Middle</div>' +
      '</div>';

    grid.insertBefore(a, noRes);
  });

  // Update count
  const countEl = document.getElementById('result-count');
  if (countEl) countEl.textContent = list.length + ' countries';

  noRes.style.display = list.length === 0 ? 'block' : 'none';
}

/* ── Search & Sort ── */
let currentSort = 'az';
let currentQuery = '';

function filterAndRender() {
  let list = COUNTRIES.slice();
  if (currentQuery) {
    const q = currentQuery.toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'');
    list = list.filter(n => {
      const norm = n.toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'');
      return norm.includes(q);
    });
  }
  if (currentSort === 'za') list.reverse();
  renderCards(list);
}

document.getElementById('country-search').addEventListener('input', function() {
  currentQuery = this.value.trim();
  filterAndRender();
});

document.getElementById('sort-select').addEventListener('change', function() {
  currentSort = this.value;
  filterAndRender();
});

// Initial render
renderCards(COUNTRIES);

/* ── Theme ── */
(function() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = saved === 'dark' ? '☀️' : '🌙';
})();
document.getElementById('theme-toggle').addEventListener('click', function() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  this.textContent = next === 'dark' ? '☀️' : '🌙';
});

/* ── Language ── */
let currentLang = localStorage.getItem('lang') || 'en';
const langSwitch = document.getElementById('lang-switch');
if (langSwitch) langSwitch.value = currentLang;

function getNested(obj, path) {
  return path.split('.').reduce((o, p) => (o && o[p] !== undefined) ? o[p] : null, obj);
}

function applyTranslations(data) {
  const root = data[currentLang] || data['en'] || {};
  document.querySelectorAll('[data-lang]').forEach(el => {
    const key = el.getAttribute('data-lang');
    const val = getNested(root, key);
    if (val !== null) {
      if (el.tagName === 'INPUT') el.placeholder = val;
      else el.textContent = val;
    }
  });
  // Re-render cards to update "See the Middle" text
  filterAndRender();
  document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = currentLang;
}

function loadLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  fetch('../assets/lang/' + lang + '.json')
    .then(r => r.json())
    .then(data => applyTranslations(data))
    .catch(() => fetch('../assets/lang/en.json').then(r => r.json()).then(data => applyTranslations(data)));
}

if (langSwitch) langSwitch.addEventListener('change', e => loadLang(e.target.value));
loadLang(currentLang);
</script>
