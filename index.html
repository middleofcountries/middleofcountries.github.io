<script>
function sstrip_share(platform) {
  var url = encodeURIComponent(window.location.href);
  var text = encodeURIComponent('Explore the geographic centers of every country in the world! 🌍 Middle of Countries');
  var map = {
    whatsapp:  'https://wa.me/?text=' + text + '%20' + url,
    twitter:   'https://twitter.com/intent/tweet?text=' + text + '&url=' + url,
    facebook:  'https://www.facebook.com/sharer/sharer.php?u=' + url,
    linkedin:  'https://www.linkedin.com/sharing/share-offsite/?url=' + url,
    telegram:  'https://t.me/share/url?url=' + url + '&text=' + text,
    reddit:    'https://reddit.com/submit?url=' + url + '&title=' + text,
    pinterest: 'https://pinterest.com/pin/create/button/?url=' + url + '&description=' + text,
    email:     'mailto:?subject=Right%20in%20the%20Middle%20%F0%9F%8C%8D&body=' + text + '%20' + url
  };
  if (platform === 'copy') {
    navigator.clipboard.writeText(decodeURIComponent(url)).then(function() {
      var btn = document.getElementById('sstrip-copy-btn');
      btn.innerHTML = '<i class="fa fa-check"></i> Copied!';
      setTimeout(function(){ btn.innerHTML = '<i class="fa fa-link"></i> Copy Link'; }, 2000);
    });
  } else if (platform === 'instagram') {
    navigator.clipboard.writeText(decodeURIComponent(url)).then(function() { alert('Link copied! Paste it in your Instagram story or bio 📸'); });
  } else {
    window.open(map[platform], '_blank');
  }
}
</script>

/* ---------------------- Helper Slug ---------------------- */
function toSlug(name){
  return name.normalize('NFKD')
             .replace(/[\u0300-\u036f]/g,'')
             .replace(/[^0-9a-zA-Z\s\-]/g,'')
             .trim().toLowerCase().replace(/\s+/g,'-');
}

/* ---------------------- Map Init ---------------------- */
am4core.ready(function() {
  am4core.useTheme(am4themes_animated);

  var chart = am4core.create("mapdiv", am4maps.MapChart);
  chart.geodata = am4geodata_worldLow;
  chart.projection = new am4maps.projections.Miller();
  chart.maxZoomLevel = 32;

  chart.zoomControl = new am4maps.ZoomControl();
  chart.zoomControl.valign = "bottom";
  chart.zoomControl.align = "right";

  var polygonSeries = chart.series.push(new am4maps.MapPolygonSeries());
  polygonSeries.useGeodata = true;
  polygonSeries.exclude = ["AQ"];

  var polygonTemplate = polygonSeries.mapPolygons.template;
  polygonTemplate.fill = am4core.color("#3aa0ff");
  polygonTemplate.fillOpacity = 0.9;
  polygonTemplate.stroke = am4core.color("#ffffff");
  polygonTemplate.strokeOpacity = 0.6;
  polygonTemplate.tooltipText = "{name}";

  var hs = polygonTemplate.states.create("hover");
  hs.properties.fill = am4core.color("#0b64b2");

  polygonTemplate.events.on("hit", function(ev) {
    var name = ev.target.dataItem.dataContext.name;
    var slug = toSlug(name);
    // relative path to countries folder next to this index file
    window.location.href = "countries/right-in-the-middle-of-" + slug + ".html";
  });

  chart.responsive.enabled = true;

}); // end am4core.ready
